  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: elo-backend
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-elo}:${POSTGRES_PASSWORD:-elo_password}@postgres:5432/${POSTGRES_DB:-elo}
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #   networks:
  #     - elo-net

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: elo-frontend
  #   restart: unless-stopped
  #   env_file:
  #     - ./frontend/.env.local
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #   networks:
  #     - elo-net

volumes:
  postgres_data:
    name: elo-postgres-data

networks:
  elo-net:
    name: elo-net
    driver: bridge
